<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万康生态食品团购超市 POS</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg-body: #f8fafc; --bg-card: #ffffff;
            --text-main: #0f172a; --text-sub: #64748b;
            --border: #cbd5e1; --radius: 8px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-body); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; } input[type=number] { -moz-appearance: textfield; }
        .icon { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .icon-sm { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }

        .header { background-color: var(--bg-card); height: 60px; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .brand { font-size: 20px; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .nav-tabs { display: flex; gap: 4px; background: #e2e8f0; padding: 4px; border-radius: 6px; }
        .nav-item { padding: 8px 16px; font-size: 14px; font-weight: 600; color: var(--text-sub); border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .nav-item:hover { color: var(--text-main); background: #cbd5e1; }
        .nav-item.active { background: white; color: var(--primary); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        .page { display: none; flex: 1; padding: 20px; height: calc(100vh - 60px); box-sizing: border-box; overflow-y: auto; }
        .page.active { display: flex; gap: 20px; }
        .card { background: var(--bg-card); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); }

        /* 组件 */
        .btn { border: none; padding: 8px 14px; font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; user-select: none; }
        .btn-primary { background: var(--primary); color: white; } .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: white; border: 2px solid var(--border); color: var(--text-main); } .btn-outline:hover { background: #f1f5f9; border-color: #94a3b8; }
        .btn-danger-ghost { background: #fef2f2; color: #ef4444; } .btn-danger-ghost:hover { background: #fee2e2; }
        .btn-warning-ghost { background: #fffbeb; color: #d97706; border: 1px solid #fcd34d; } .btn-warning-ghost:hover { background: #fef3c7; }
        .scan-box { position: relative; width: 100%; }
        .scan-box input { width: 100%; padding: 12px 12px 12px 42px; font-size: 15px; border: 2px solid var(--border); border-radius: var(--radius); outline: none; box-sizing: border-box; transition: 0.2s; background: #f8fafc; }
        .scan-box input:focus { border-color: var(--primary); background: white; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-sub); pointer-events: none; }

        /* 库存预警样式 */
        .row-low-stock { background-color: #fef2f2 !important; }
        .stock-warning { color: #ef4444; font-weight: 900; display: flex; align-items: center; gap: 4px; }

        /* 其他样式保持简洁 */
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .kpi-value { font-size: 32px; font-weight: 900; color: var(--text-main); margin-top: 8px; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: 350px; }
        .order-filter-tabs { display: flex; border-bottom: 1px solid var(--border); background: #f1f5f9; }
        .filter-tab { flex: 1; text-align: center; padding: 14px; font-weight: 600; color: var(--text-sub); cursor: pointer; border-bottom: 3px solid transparent; } .filter-tab.active { background: white; color: var(--primary); border-bottom-color: var(--primary); }
        .order-card-item { padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer; } .order-card-item.selected { background: #dbeafe; border-left: 4px solid var(--primary); }
        .cart-item { display: grid; grid-template-columns: 3fr 1fr 1.5fr 1fr 40px; padding: 16px; border-bottom: 1px solid var(--border); align-items: center; }
        .qty-control { display: flex; align-items: center; border: 2px solid var(--border); border-radius: 6px; width: fit-content; background: white; }
        .qty-btn { width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; cursor: pointer; background: #e2e8f0; font-weight: 700; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table th { background: #f8fafc; padding: 12px 16px; text-align: left; } .data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; justify-content: center; align-items: center; }
        .modal { width: 420px; background: white; padding: 32px; border-radius: 16px; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        .profit-display { font-size: 13px; color: var(--success); font-weight: 600; margin-top: 4px; display: flex; justify-content: space-between; }
        .time-filters { display: flex; gap: 8px; } .time-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 13px; } .time-btn.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">
        <svg class="icon" style="color:var(--primary); width:28px; height:28px;" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
        万康超市 <span style="font-size:13px; background:#eff6ff; color:var(--primary); padding:2px 8px; border-radius:20px; margin-left:8px; border:1px solid #dbeafe;">POS</span>
    </div>
    <div class="nav-tabs">
        <div class="nav-item active" onclick="switchTab('cashier')">收银台</div>
        <div class="nav-item" onclick="switchTab('orders')">订单管理</div>
        <div class="nav-item" onclick="switchTab('inventory')">商品库存</div>
        <div class="nav-item" onclick="switchTab('report')">营收报表</div>
    </div>
</div>

<div id="page-cashier" class="page active">
    <div class="card" style="flex:7;">
        <div style="padding:12px 16px; background:#f1f5f9; border-bottom:2px solid var(--border); font-weight:700; color:var(--text-sub); display:grid; grid-template-columns:3fr 1fr 1.5fr 1fr 40px;"><span>商品</span><span>单价</span><span>数量</span><span>小计</span><span></span></div>
        <div id="cart-list" style="flex:1; overflow-y:auto;"></div>
    </div>
    <div class="card" style="flex:3; padding:20px; gap:20px;">
        <div class="scan-box"><svg class="icon search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><input type="text" id="barcode-input" placeholder="扫码 / 输入名称..." autocomplete="off"><div id="search-dropdown" class="search-results"></div></div>
        <div style="background:#f8fafc; padding:24px; border-radius:8px; border:1px solid var(--border); text-align:right; margin-top:auto;"><div style="font-size:14px; color:var(--text-sub); font-weight:700; margin-bottom:8px;">TOTAL</div><div style="font-size:42px; font-weight:900;">¥ <span id="total-val">0.00</span></div></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <button class="btn btn-outline" onclick="openBookModal()">📦 挂单预订</button><button class="btn btn-danger-ghost" onclick="clearCart()">🗑️ 清空</button>
            <button class="btn btn-primary" style="grid-column:span 2; justify-content:center; padding:16px; font-size:18px;" onclick="checkout()">🚀 结算 (Space)</button>
        </div>
    </div>
</div>

<div id="page-orders" class="page">
    <div class="card" style="flex:1; display:flex; flex-direction:row;">
        <div style="width:320px; border-right:1px solid var(--border); display:flex; flex-direction:column; background: #f8fafc;">
            <div class="order-filter-tabs"><div class="filter-tab active" onclick="switchOrderTab('Pending')" id="tab-pending">⏳ 进行中</div><div class="filter-tab" onclick="switchOrderTab('Completed')" id="tab-completed">📜 历史记录</div></div>
            <div style="padding:20px; border-bottom:1px solid var(--border);"><div class="scan-box"><svg class="icon search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><input type="text" id="search-input" placeholder="搜单号/姓名/电话..." onkeyup="searchOrders()" style="background:white;"></div></div>
            <div id="order-list" style="flex:1; overflow-y:auto;"></div>
        </div>
        <div class="card" style="flex:1; border:none; border-radius:0; box-shadow:none;">
            <div id="order-empty-tip" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-sub);"><span style="font-size:16px; font-weight:600;">请从左侧选择一个订单查看详情</span></div>
            <div id="order-detail-content" style="display:none; flex-direction:column; height:100%;">
                <div style="padding:24px; border-bottom:1px solid var(--border); background:#f8fafc;"><div style="display:flex; justify-content:space-between; align-items:center;"><div><span style="background:#e0e7ff; color:var(--primary); padding:2px 6px; border-radius:4px; font-weight:700;" id="detail-id">#0</span><span style="font-size:20px; font-weight:800; margin-left:8px;" id="detail-name"></span></div><div style="font-size:14px; color:var(--text-sub);" id="detail-time"></div></div><div style="margin-top:4px; color:var(--text-sub); font-size:14px;" id="detail-phone"></div></div>
                <div style="flex:1; overflow-y:auto; padding:0 24px;"><div id="section-unpicked"></div><div id="section-picked"></div></div>
                <div id="pickup-action-bar" style="padding:20px; border-top:1px solid var(--border); text-align:right; background:#f8fafc;"><button class="btn btn-primary" style="padding:12px 24px;" onclick="submitPickup()">✅ 确认提货</button></div>
            </div>
        </div>
    </div>
</div>

<div id="page-inventory" class="page">
    <div class="card" style="flex:1;">
        <div style="padding:20px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:#f8fafc;">
            <div style="font-weight:800; font-size:18px;">📦 库存管理</div>
            <div style="display:flex; gap:12px; align-items:center;">
                <button class="btn btn-warning-ghost" id="btn-low-stock" onclick="toggleLowStock()">⚠️ 只看缺货</button>
                <div style="width:1px; height:20px; background:#ccc; margin:0 4px;"></div>
                <button class="btn btn-outline" onclick="window.location.href='/api/system/backup'">📥 备份</button>
                <button class="btn btn-outline" onclick="document.getElementById('file-upload').click()">📤 恢复</button>
                <input type="file" id="file-upload" style="display:none;" onchange="restoreData(this)">

                <div class="scan-box" style="width:240px; margin-left:10px;"><svg class="icon search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><input type="text" placeholder="搜索..." oninput="loadInventory(this.value)" style="background:white;"></div>
                <button class="btn btn-primary" onclick="openProductModal()">新增</button>
            </div>
        </div>
        <div style="flex:1; overflow-y:auto;">
            <table class="data-table">
                <thead><tr><th>ID</th><th>条码</th><th>名称</th><th>进价</th><th>售价</th><th>库存</th><th>毛利分析</th><th>操作</th></tr></thead>
                <tbody id="inventory-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="page-report" class="page">
    <div style="display:flex; flex-direction:column; gap:20px; width:100%;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-size:24px; font-weight:800;">📊 营收数据分析</div>
            <div class="time-filters"><div class="time-btn active" onclick="loadReport('day', this)">今日</div><div class="time-btn" onclick="loadReport('week', this)">本周</div><div class="time-btn" onclick="loadReport('month', this)">本月</div><div class="time-btn" onclick="loadReport('year', this)">全年</div></div>
        </div>
        <div class="kpi-grid">
            <div class="kpi-card"><div style="font-size:14px;color:#666;font-weight:700;">总营收</div><div class="kpi-value" id="rpt-revenue">¥0.00</div></div>
            <div class="kpi-card"><div style="font-size:14px;color:#666;font-weight:700;">总毛利</div><div class="kpi-value" style="color:var(--success)" id="rpt-profit">¥0.00</div></div>
            <div class="kpi-card"><div style="font-size:14px;color:#666;font-weight:700;">订单数</div><div class="kpi-value" id="rpt-count">0</div></div>
        </div>
        <div style="display:flex; gap:20px; height:400px;">
            <div class="chart-container" style="flex:2;"><div style="font-weight:700;color:#666;margin-bottom:10px;">营收趋势</div><div style="height:300px;"><canvas id="barChart"></canvas></div></div>
            <div class="chart-container" style="flex:1;"><div style="font-weight:700;color:#666;margin-bottom:10px;">畅销 TOP 5</div><div style="height:300px;display:flex;justify-content:center;"><canvas id="pieChart"></canvas></div></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="booking-modal">
    <div class="modal"><h3>📝 新建预订订单</h3><div class="form-group"><label>姓名</label><input id="book-name"></div><div class="form-group"><label>电话</label><input id="book-phone"></div><div class="modal-footer"><button class="btn btn-outline" onclick="document.getElementById('booking-modal').style.display='none'">取消</button><button class="btn btn-primary" onclick="submitBooking()">保存</button></div></div>
</div>
<div class="modal-overlay" id="product-modal">
    <div class="modal">
        <h3 id="modal-title">✨ 新增商品</h3><input type="hidden" id="prod-id"><div class="form-group"><label>条码</label><input id="prod-barcode"></div><div class="form-group"><label>名称</label><input id="prod-name"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;"><div class="form-group"><label>进价</label><input type="number" id="prod-cost" step="0.01" oninput="calcMargin()"></div><div class="form-group"><label>售价</label><input type="number" id="prod-price" step="0.01" oninput="calcMargin()"></div></div>
        <div id="margin-display" class="profit-display"><span>毛利: ¥0.00</span><span>利润率: 0%</span></div><div class="form-group" style="margin-top:16px;"><label>库存</label><input type="number" id="prod-stock"></div>
        <div class="modal-footer"><button class="btn btn-outline" onclick="document.getElementById('product-modal').style.display='none'">取消</button><button class="btn btn-primary" onclick="saveProduct()">保存</button></div>
    </div>
</div>

<script>
    let cart=[], currentOrder=null, currentOrderTab='Pending', invDebounce;
    let barChartInstance=null, pieChartInstance=null;
    let showLowStockOnly = false; // 缺货筛选状态

    function switchTab(t) {
        document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        if(t==='cashier'){ document.querySelectorAll('.nav-item')[0].classList.add('active'); document.getElementById('page-cashier').classList.add('active'); document.getElementById('barcode-input').focus(); }
        else if(t==='orders'){ document.querySelectorAll('.nav-item')[1].classList.add('active'); document.getElementById('page-orders').classList.add('active'); searchOrders(); }
        else if(t==='inventory'){ document.querySelectorAll('.nav-item')[2].classList.add('active'); document.getElementById('page-inventory').classList.add('active'); loadInventory(); }
        else if(t==='report'){ document.querySelectorAll('.nav-item')[3].classList.add('active'); document.getElementById('page-report').classList.add('active'); loadReport('day'); }
    }

    // --- 核心更新：库存逻辑 (预警+备份) ---
    function toggleLowStock() {
        showLowStockOnly = !showLowStockOnly;
        const btn = document.getElementById('btn-low-stock');
        if(showLowStockOnly) { btn.style.background='#fef3c7'; btn.innerText='⚠️ 显示全部'; }
        else { btn.style.background='#fffbeb'; btn.innerText='⚠️ 只看缺货'; }
        loadInventory();
    }

    function loadInventory(q=''){
        clearTimeout(invDebounce);
        invDebounce = setTimeout(()=>fetch(`/api/inventory/list?q=${q}`).then(r=>r.json()).then(list=>{
            // 前端筛选低库存
            if(showLowStockOnly) {
                list = list.filter(p => p.stock < 10);
            }
            document.getElementById('inventory-list').innerHTML = list.map(p=>{
                const margin = p.price - p.cost_price;
                const rate = p.price > 0 ? ((margin / p.price) * 100).toFixed(0) + '%' : '0%';
                const isLow = p.stock < 10;
                return `
                <tr class="${isLow ? 'row-low-stock' : ''}">
                    <td>${p.id}</td><td>${p.barcode}</td>
                    <td><div style="font-weight:700;">${p.name}</div></td>
                    <td>${p.cost_price.toFixed(2)}</td><td><div style="font-weight:700;">${p.price.toFixed(2)}</div></td>
                    <td><div class="${isLow ? 'stock-warning' : ''}" style="font-weight:700;">${isLow?'⚠️ ':''}${p.stock}</div></td>
                    <td><span class="badge" style="background:#f3f4f6">¥${margin.toFixed(2)} (${rate})</span></td>
                    <td><button style="color:var(--primary);border:none;background:none;cursor:pointer;font-weight:700;" onclick='openProductModal(${JSON.stringify(p)})'>编辑</button> <button style="color:#ef4444;border:none;background:none;cursor:pointer;font-weight:700;" onclick='delProd(${p.id})'>删除</button></td>
                </tr>`;
            }).join('');
        }), 300);
    }

    function restoreData(input) {
        if (!input.files || !input.files[0]) return;
        if (!confirm("⚠️ 警告：恢复数据将覆盖当前所有数据！\n确定要继续吗？")) { input.value = ''; return; }

        const fd = new FormData();
        fd.append('db_file', input.files[0]);

        fetch('/api/system/restore', {method: 'POST', body: fd})
            .then(async r => {
                const msg = await r.text();
                alert(msg);
                if(r.ok) location.reload(); // 刷新页面
            })
            .catch(e => alert("恢复失败: " + e));
        input.value = '';
    }

    // --- 其他原有逻辑 ---
    const inputEl = document.getElementById('barcode-input');
    inputEl.addEventListener('input', (e) => { const q = e.target.value.trim(); if(!q) { document.getElementById('search-dropdown').style.display='none'; return; } setTimeout(() => fetch(`/api/product/search?q=${q}`).then(r=>r.json()).then(list=>{ const dd = document.getElementById('search-dropdown'); if(!list||list.length===0){ dd.style.display='none'; return; } dd.innerHTML = list.map(p=>`<div class="search-item" onclick='addToCart(${JSON.stringify(p)});inputEl.value="";dd.style.display="none";inputEl.focus();'><div><b>${p.name}</b><br><small>${p.barcode}</small></div><b>¥${p.price}</b></div>`).join(''); dd.style.display='block'; }), 300); });
    inputEl.addEventListener('keypress', (e)=>{if(e.key==='Enter')fetch(`/api/scan?code=${inputEl.value}`).then(r=>r.ok?r.json():null).then(p=>{if(p){addToCart(p);inputEl.value='';}})});
    document.addEventListener('keydown', (e)=>{if(e.code==='Space'&&e.target.tagName!=='INPUT'&&document.getElementById('page-cashier').classList.contains('active')){e.preventDefault();checkout();}});
    function addToCart(p){ const i=cart.find(x=>x.id===p.id); if(i)i.qty++; else cart.push({...p,qty:1}); renderCart(); }
    function renderCart(){ let t=0; document.getElementById('cart-list').innerHTML = cart.map((i,idx)=>{ t+=i.price*i.qty; return `<div class="cart-item"><div><b>${i.name}</b><br><small style="color:#666">${i.barcode}</small></div><div>¥<input class="price-edit" type="number" value="${i.price}" onchange="cart[${idx}].price=parseFloat(this.value);renderCart()"></div><div class="qty-control"><div class="qty-btn" onclick="updateQty(${idx},-1)">−</div><input class="qty-val" value="${i.qty}" readonly><div class="qty-btn" onclick="updateQty(${idx},1)">+</div></div><b>¥${(i.price*i.qty).toFixed(2)}</b><div style="cursor:pointer;color:red" onclick="cart.splice(${idx},1);renderCart()">×</div></div>`}).join(''); document.getElementById('total-val').innerText = t.toFixed(2); }
    function updateQty(idx,d){ const n=cart[idx].qty+d; if(n>0)cart[idx].qty=n;renderCart(); }
    function clearCart(){ cart=[]; renderCart(); }
    function checkout(){ if(cart.length===0)return alert('空'); fetch('/api/checkout',{method:'POST',body:JSON.stringify({items:cart})}).then(r=>r.ok?(alert('✅ 成功'),clearCart()):alert('❌ 失败')); }
    function openBookModal(){ if(cart.length===0)return alert('空'); document.getElementById('booking-modal').style.display='flex'; }
    function submitBooking(){ const n=document.getElementById('book-name').value, p=document.getElementById('book-phone').value; if(!n)return alert('姓名必填'); fetch('/api/book',{method:'POST',body:JSON.stringify({customer_name:n,phone:p,items:cart})}).then(r=>r.ok?(alert('✅ 预订成功'),document.getElementById('booking-modal').style.display='none',clearCart()):alert('失败')); }
    function switchOrderTab(status) { currentOrderTab = status; document.querySelectorAll('.filter-tab').forEach(el => el.classList.remove('active')); document.getElementById(`tab-${status.toLowerCase()}`).classList.add('active'); document.getElementById('pickup-action-bar').style.display = status === 'Completed' ? 'none' : 'block'; searchOrders(); }
    function searchOrders() { const q = document.getElementById('search-input').value; fetch(`/api/orders?status=${currentOrderTab}&q=${q}`).then(r=>r.json()).then(list => { const el = document.getElementById('order-list'); if(!list || list.length===0) { el.innerHTML='<div style="text-align:center;padding:40px;color:#999">无订单</div>'; return; } el.innerHTML = list.map((o,i) => `<div class="order-card-item" onclick="selectOrder(${i})" id="ord-${i}"><div style="display:flex;justify-content:space-between;"><span class="order-id-badge">#${o.id}</span><small style="color:#999">${o.created_at.substring(5,16)}</small></div><div style="font-weight:700;">${o.customer_name} <span style="font-weight:400;color:#666">${o.phone}</span></div></div>`).join(''); window.cachedOrders = list; }); }
    function selectOrder(idx) { const o = window.cachedOrders[idx]; currentOrder = o; document.querySelectorAll('.order-card-item').forEach(e=>e.classList.remove('selected')); document.getElementById(`ord-${idx}`).classList.add('selected'); document.getElementById('order-empty-tip').style.display='none'; document.getElementById('order-detail-content').style.display='flex'; document.getElementById('detail-id').innerText = '#' + o.id; document.getElementById('detail-name').innerText = o.customer_name; document.getElementById('detail-phone').innerText = o.phone; document.getElementById('detail-time').innerText = o.created_at; const items = o.items || []; const unpicked = items.filter(i => i.qty_ordered > i.qty_picked); const picked = items.filter(i => i.qty_picked > 0); let h1 = '', h2 = ''; if (unpicked.length > 0) { h1 = `<div class="section-title"><span style="color:var(--primary)">📦 待提取</span></div>` + unpicked.map(i => { const remain = i.qty_ordered - i.qty_picked; return `<div class="pickup-item"><div><div style="font-weight:700;">${i.product_name}</div><div style="font-size:12px;color:#666">共订 ${i.qty_ordered} | 已取 ${i.qty_picked}</div></div><div style="display:flex;align-items:center;gap:10px;"><span style="color:red;font-size:12px;font-weight:bold;">剩余 ${remain}</span>${currentOrderTab === 'Pending' ? `<input class="pickup-input" type="number" data-id="${i.id}" data-max="${remain}" value="0" onclick="this.select()">` : ''}</div></div>`; }).join(''); } if (picked.length > 0) { h2 = `<div class="section-title">✅ 已提取记录</div>` + picked.map(i => `<div style="padding:8px 0; border-bottom:1px dashed #eee; display:flex; justify-content:space-between; color:#999; font-size:14px;"><span>${i.product_name}</span><span>已取 x${i.qty_picked}</span></div>`).join(''); } document.getElementById('section-unpicked').innerHTML = h1; document.getElementById('section-picked').innerHTML = h2; }
    function submitPickup() { const items = []; document.querySelectorAll('.pickup-input').forEach(el => { const q = parseInt(el.value); if(q > 0) { if(q > parseInt(el.dataset.max)) return alert('超量'); items.push({item_id: parseInt(el.dataset.id), qty: q}); } }); if(items.length===0) return alert('输入数量'); fetch('/api/pickup', {method:'POST', body:JSON.stringify({order_id:currentOrder.id, items})}).then(r=>r.ok?(alert('✅ 成功'), searchOrders(), document.getElementById('order-detail-content').style.display='none'):alert('失败')); }
    function delProd(id){ if(confirm('确定删除?'))fetch(`/api/inventory/delete?id=${id}`).then(r=>r.ok?(alert('删除成功'),loadInventory()):r.text().then(alert)); }
    function openProductModal(p){ document.getElementById('product-modal').style.display='flex'; document.getElementById('modal-title').innerText=p?'✏️ 编辑':'✨ 新增'; document.getElementById('prod-id').value=p?p.id:0; document.getElementById('prod-barcode').value=p?p.barcode:''; document.getElementById('prod-name').value=p?p.name:''; document.getElementById('prod-cost').value=p?p.cost_price:''; document.getElementById('prod-price').value=p?p.price:''; document.getElementById('prod-stock').value=p?p.stock:''; calcMargin(); if(!p) setTimeout(()=>document.getElementById('prod-barcode').focus(), 100); }
    function saveProduct(){ const p={id:parseInt(document.getElementById('prod-id').value)||0,barcode:document.getElementById('prod-barcode').value,name:document.getElementById('prod-name').value,cost_price:parseFloat(document.getElementById('prod-cost').value)||0,price:parseFloat(document.getElementById('prod-price').value)||0,stock:parseInt(document.getElementById('prod-stock').value)||0}; fetch('/api/inventory/save',{method:'POST',body:JSON.stringify(p)}).then(r=>r.json()).then(res=>{ if(res.success){alert('✅ 保存成功');document.getElementById('product-modal').style.display='none';loadInventory();} else if(res.conflict_id && confirm(res.message+'\n跳转编辑?')){document.getElementById('product-modal').style.display='none';fetch('/api/inventory/list').then(r=>r.json()).then(l=>openProductModal(l.find(x=>x.id===res.conflict_id)));} else alert(res.message); }); }
    function calcMargin() { const cost = parseFloat(document.getElementById('prod-cost').value) || 0; const price = parseFloat(document.getElementById('prod-price').value) || 0; const margin = price - cost; const rate = price > 0 ? ((margin / price) * 100).toFixed(0) : 0; document.getElementById('margin-display').innerHTML = `<span>毛利: <span style="color:${margin>=0?'#10b981':'#ef4444'}">¥${margin.toFixed(2)}</span></span><span>利润率: ${rate}%</span>`; }
    function loadReport(type, btn=null) { if(btn) { document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); } fetch(`/api/report?type=${type}`).then(r=>r.json()).then(data => { document.getElementById('rpt-revenue').innerText = '¥' + data.total_revenue.toFixed(2); document.getElementById('rpt-profit').innerText = '¥' + data.total_profit.toFixed(2); document.getElementById('rpt-count').innerText = data.order_count; const ctxBar = document.getElementById('barChart'); if(barChartInstance) barChartInstance.destroy(); barChartInstance = new Chart(ctxBar, { type: 'bar', data: { labels: (data.chart_labels||[]).length>0?data.chart_labels:['无'], datasets: [{ label: '营收', data: (data.chart_data||[]).length>0?data.chart_data:[0], backgroundColor: '#2563eb', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } }); const ctxPie = document.getElementById('pieChart'); if(pieChartInstance) pieChartInstance.destroy(); pieChartInstance = new Chart(ctxPie, { type: 'doughnut', data: { labels: (data.pie_labels||[]).length>0?data.pie_labels:['无'], datasets: [{ data: (data.pie_data||[]).length>0?data.pie_data:[1], backgroundColor: ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] }] }, options: { responsive: true, maintainAspectRatio: false } }); }); }

    inputEl.focus();
</script>
